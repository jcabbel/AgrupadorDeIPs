<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agrupador de IPs</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10 px-4">
  <div class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-3xl">
    <h1 class="text-2xl font-bold text-center mb-6">🌐 Agrupador de IPs</h1>

    <div class="space-y-4">
      <textarea id="ipsInput" rows="8" placeholder="Pega aquí tus IPs" class="w-full border rounded-xl p-3 focus:ring focus:ring-blue-300"></textarea>

      <div class="flex justify-between items-center">
        <input type="file" id="fileInput" accept=".txt" class="text-sm">
        <button id="analyzeBtn" class="bg-blue-600 text-white px-4 py-2 rounded-xl hover:bg-blue-700 transition">Agrupar</button>
      </div>
    </div>

    <div class="mt-6 bg-gray-100 border border-gray-300 rounded-xl p-3 text-center text-sm text-gray-700">
    Las subredes se consideran <strong>agrupadas</strong> cuando contienen 5 o más direcciones IP de la misma /24.
    </div>



    <div id="resultSection" class="mt-8 hidden">
      <h2 class="text-xl font-semibold mb-3">📄 Resultado</h2>
      <pre id="output" class="bg-gray-900 text-green-200 p-4 rounded-xl text-sm overflow-x-auto max-h-96"></pre>

      <div class="mt-4 flex justify-end">
        <button id="downloadBtn" class="bg-green-600 text-white px-4 py-2 rounded-xl hover:bg-green-700 transition">
          Descargar resultado.txt
        </button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      console.log("Página cargada, iniciando script...");
      
      const fileInput = document.getElementById('fileInput');
      const ipsInput = document.getElementById('ipsInput');
      const analyzeBtn = document.getElementById('analyzeBtn');
      const output = document.getElementById('output');
      const resultSection = document.getElementById('resultSection');
      const downloadBtn = document.getElementById('downloadBtn');

      // Leer archivo de texto
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          ipsInput.value = event.target.result;
          console.log("Archivo leído correctamente");
        };
        reader.readAsText(file);
      });

      // Verificar IP válida
      function esIPValida(ip) {
        return /^\d{1,3}(\.\d{1,3}){3}$/.test(ip) && ip.split('.').every(o => o >= 0 && o <= 255);
      }

      // Detectar IP privada
      function esPrivada(ip) {
        const [a,b] = ip.split('.').map(Number);
        return (
          a === 10 ||
          (a === 172 && b >= 16 && b <= 31) ||
          (a === 192 && b === 168) ||
          a === 127 ||
          (a === 169 && b === 254) ||
          (a === 100 && (b & 192) === 64)
        );
      }

      function ipToNum(ip) {
        return ip.split('.').reduce((acc, oct) => acc * 256 + Number(oct), 0);
      }

      function agruparPorSubred(lista) {
        const subredes = {};
        for (const ip of lista) {
          const octetos = ip.split('.');
          const subred = `${octetos[0]}.${octetos[1]}.${octetos[2]}.0/24`;
          if (!subredes[subred]) subredes[subred] = [];
          subredes[subred].push(ip);
        }

        const agrupadas = [];
        const individuales = [];
        for (const [subred, ips] of Object.entries(subredes)) {
          if (ips.length > 4) agrupadas.push(subred);
          else individuales.push(...ips);
        }

        return {
          agrupadas: agrupadas.sort((a,b)=>ipToNum(a.split('/')[0]) - ipToNum(b.split('/')[0])),
          individuales: individuales.sort((a,b)=>ipToNum(a) - ipToNum(b))
        };
      }

      analyzeBtn.addEventListener('click', () => {
        console.log("Botón Agrupar presionado");
        const lineas = ipsInput.value.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
        const ips = [...new Set(lineas.filter(esIPValida))].sort((a,b)=>ipToNum(a) - ipToNum(b));

        if (ips.length === 0) {
          alert("No se encontraron IPs válidas.");
          return;
        }

        const privadas = ips.filter(esPrivada);
        const publicas = ips.filter(ip => !esPrivada(ip));

        const resultadoPrivadas = agruparPorSubred(privadas);
        const resultadoPublicas = agruparPorSubred(publicas);

        const texto = [
          "== SUBREDES PRIVADAS AGRUPADAS ==",
          resultadoPrivadas.agrupadas.join("\n") || "(ninguna)",
          "",
          "== IPs PRIVADAS INDIVIDUALES ==",
          resultadoPrivadas.individuales.join("\n") || "(ninguna)",
          "",
          "== SUBREDES PUBLICAS AGRUPADAS ==",
          resultadoPublicas.agrupadas.join("\n") || "(ninguna)",
          "",
          "== IPs PUBLICAS INDIVIDUALES ==",
          resultadoPublicas.individuales.join("\n") || "(ninguna)",
        ].join("\n");

        output.textContent = texto;
        resultSection.classList.remove('hidden');
        console.log("Análisis completado");

        downloadBtn.onclick = () => {
          const blob = new Blob([texto], {type: 'text/plain;charset=utf-8'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'resultado.txt';
          a.click();
          URL.revokeObjectURL(url);
        };
      });
    });
  </script>
</body>
</html>
